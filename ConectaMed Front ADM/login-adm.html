<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login ADM | ConectaMed</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="logo">
        <span class="logo-icon">♡</span>
        <span>ConectaMed</span>
      </div>

      <h1 class="login-title">Área Administrativa</h1>
      <p class="login-subtitle">
        Acesse sua conta para gerenciar a plataforma ConectaMed.
      </p>

      <form class="form">
        <div class="form-group">
          <label for="email">E-mail administrativo</label>
          <input id="email" type="email" placeholder="admin@conectamed.com" />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input id="senha" type="password" placeholder="Digite sua senha" />
        </div>

        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" />
            Lembrar de mim
          </label>

          <a href="#">Esqueci minha senha</a>
        </div>

        <a class="btn btn-primary btn-full" href="dashboard.html">Entrar no painel</a>

        <div class="divider">ou</div>

        <a class="btn btn-outline btn-full" href="#">Voltar para o site</a>
      </form>

      <p class="login-footer">© 2025 ConectaMed. Todos os direitos reservados.</p>
    </section>
  </main>
</body>
</html>
